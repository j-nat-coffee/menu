<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>J Nat Coffee — Digital Menu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Serif+Ethiopic:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-dark: #120D0A;
    --bg-card: #1D1510;
    --bg-card-hover: #261D17;
    --bg-glass: rgba(29, 21, 16, 0.88);
    --gold: #D4AF37;
    --gold-light: #F3E5AB;
    --clay: #C98B5E;
    --clay-dark: #A8693E;
    --text-primary: #F9F6F0;
    --text-secondary: #CBBDAE;
    --text-muted: #8E7F70;
    --line: rgba(212, 175, 55, 0.15);
    --line-soft: rgba(255, 255, 255, 0.08);
    --green: #4E8752;
    --shadow-main: 0 10px 30px rgba(0,0,0,0.6);
    --shadow-glow: 0 0 20px rgba(212, 175, 55, 0.2);
    --radius-lg: 18px;
    --radius-md: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background-color: var(--bg-dark);
    color: var(--text-primary);
    font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    padding-bottom: 90px;
    overflow-x: hidden;
  }

  .amharic {
    font-family: 'Noto Serif Ethiopic', serif;
  }

  /* Header Branding */
  .app-header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg-glass);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--line);
    padding: 12px 16px 14px;
    transition: all 0.3s ease;
  }

  .brand-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .brand-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-container {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 2px solid var(--gold);
    overflow: hidden;
    background: #000;
    box-shadow: var(--shadow-glow);
    flex-shrink: 0;
  }

  .logo-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .brand-title h1 {
    font-size: 1.35rem;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: 0.02em;
    line-height: 1.1;
  }

  .brand-title .sub {
    font-size: 0.8rem;
    color: var(--gold);
    margin-top: 2px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .badge-open {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
  }

  .search-box {
    position: relative;
    width: 100%;
  }

  .search-input {
    width: 100%;
    height: 44px;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid var(--line-soft);
    border-radius: 99px;
    padding: 0 16px 0 44px;
    color: var(--text-primary);
    font-size: 0.92rem;
    outline: none;
    transition: all 0.25s ease;
  }

  .search-input:focus {
    background: rgba(255, 255, 255, 0.1);
    border-color: var(--gold);
    box-shadow: 0 0 12px rgba(212, 175, 55, 0.25);
  }

  .search-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    width: 18px;
    height: 18px;
    pointer-events: none;
  }

  .clear-search {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 1.1rem;
    cursor: pointer;
    display: none;
  }

  /* Category Nav Strip */
  .category-nav-wrapper {
    position: sticky;
    top: 122px;
    z-index: 90;
    background: var(--bg-dark);
    padding: 10px 0 6px;
    border-bottom: 1px solid var(--line-soft);
  }

  .category-strip {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 0 16px 6px;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }

  .category-strip::-webkit-scrollbar { display: none; }

  .cat-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--bg-card);
    border: 1px solid var(--line-soft);
    border-radius: 99px;
    padding: 8px 16px;
    color: var(--text-secondary);
    font-size: 0.85rem;
    font-weight: 500;
    white-space: nowrap;
    cursor: pointer;
    transition: all 0.25s ease;
    flex-shrink: 0;
  }

  .cat-btn:hover, .cat-btn.active {
    background: linear-gradient(135deg, var(--clay-dark), var(--clay));
    border-color: var(--gold);
    color: #fff;
    box-shadow: 0 4px 12px rgba(201, 139, 94, 0.35);
    transform: translateY(-1px);
  }

  .cat-btn.active { font-weight: 600; }

  /* Main Container */
  .main-content {
    max-width: 1200px;
    margin: 0 auto;
    padding: 16px;
  }

  .section-title {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin: 20px 0 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--line);
  }

  .section-title h2 {
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--gold-light);
    letter-spacing: 0.02em;
  }

  .section-title .am-sub {
    font-size: 0.95rem;
    color: var(--clay);
  }

  /* Grid Layout */
  .menu-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(165px, 1fr));
    gap: 14px;
  }

  @media (min-width: 600px) {
    .menu-grid {
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 18px;
    }
  }

  /* Card Component */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--line-soft);
    border-radius: var(--radius-md);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
    cursor: pointer;
    transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
    animation: fadeIn 0.4s ease forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card:hover {
    transform: translateY(-3px);
    border-color: var(--gold);
    box-shadow: var(--shadow-main);
  }

  .card-img-wrap {
    position: relative;
    width: 100%;
    padding-top: 75%; /* Aspect ratio */
    background: #18110B;
    overflow: hidden;
  }

  .card-img {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    object-fit: contain; /* Guarantees 100% of dish is visible without cropping! */
    object-position: center center;
    background: #18110B;
    transition: transform 0.4s ease;
  }

  .card:hover .card-img {
    transform: scale(1.04);
  }

  .card-badge {
    position: absolute;
    top: 8px;
    left: 8px;
    background: rgba(18, 13, 10, 0.85);
    backdrop-filter: blur(8px);
    border: 1px solid var(--gold);
    color: var(--gold-light);
    font-size: 0.65rem;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 99px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    z-index: 5;
  }

  .card-body {
    padding: 12px;
    display: flex;
    flex-direction: column;
    flex: 1;
    justify-content: space-between;
  }

  .card-title-en {
    font-size: 0.92rem;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.25;
  }

  .card-title-am {
    font-size: 0.78rem;
    color: var(--clay);
    margin-top: 3px;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 12px;
    padding-top: 8px;
    border-top: 1px dotted var(--line-soft);
  }

  .card-price {
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--gold);
  }

  .card-price::after {
    content: " ETB";
    font-size: 0.68rem;
    font-weight: 400;
    color: var(--text-muted);
  }

  .add-btn {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: rgba(212, 175, 55, 0.12);
    border: 1px solid var(--gold);
    color: var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .add-btn:active, .add-btn:hover {
    background: var(--gold);
    color: #000;
    transform: scale(1.1);
  }

  /* Floating Order Calculator Bar */
  .order-bar {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    width: calc(100% - 32px);
    max-width: 500px;
    background: linear-gradient(135deg, #2B1E15, #1A120C);
    border: 1.5px solid var(--gold);
    border-radius: 99px;
    padding: 10px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 12px 35px rgba(0,0,0,0.8), var(--shadow-glow);
    z-index: 200;
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  .order-bar.show {
    transform: translateX(-50%) translateY(0);
  }

  .order-info {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .order-count {
    background: var(--gold);
    color: #000;
    font-size: 0.85rem;
    font-weight: 700;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .order-total-lbl {
    font-size: 0.75rem;
    color: var(--text-muted);
  }

  .order-total-val {
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--gold-light);
  }

  .view-order-btn {
    background: var(--gold);
    color: #000;
    border: none;
    padding: 8px 18px;
    border-radius: 99px;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .view-order-btn:active { transform: scale(0.95); }

  /* Modal Sheet */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.75);
    backdrop-filter: blur(8px);
    z-index: 300;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }

  @media (min-width: 600px) {
    .modal-overlay { align-items: center; }
  }

  .modal-overlay.active {
    opacity: 1;
    pointer-events: auto;
  }

  .modal-sheet {
    width: 100%;
    max-width: 520px;
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 24px 24px 0 0;
    max-height: 88vh;
    overflow-y: auto;
    padding: 24px;
    position: relative;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.1, 0.9, 0.2, 1);
  }

  @media (min-width: 600px) {
    .modal-sheet { border-radius: 24px; transform: translateY(20px) scale(0.95); }
  }

  .modal-overlay.active .modal-sheet {
    transform: translateY(0) scale(1);
  }

  .modal-close {
    position: absolute;
    top: 16px; right: 16px;
    width: 34px; height: 34px;
    border-radius: 50%;
    background: rgba(0, 0, 0, 0.7);
    border: 1px solid var(--line);
    color: var(--text-primary);
    font-size: 1.2rem;
    cursor: pointer;
    z-index: 10;
    display: flex; align-items: center; justify-content: center;
  }

  .modal-img-container {
    width: 100%;
    height: 240px;
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 16px;
    background: #18110B;
    position: relative;
    border: 1px solid var(--line-soft);
  }

  .modal-img {
    width: 100%;
    height: 100%;
    object-fit: contain; /* Ensures 100% of full cup/plate is shown with ZERO cropping! */
    object-position: center center;
  }

  .modal-title { font-size: 1.4rem; font-weight: 700; color: var(--text-primary); }
  .modal-amharic { font-size: 1.1rem; color: var(--gold); margin-top: 2px; }
  .modal-desc { font-size: 0.9rem; color: var(--text-secondary); margin: 12px 0 20px; line-height: 1.5; }

  .qty-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--line-soft);
  }

  .qty-ctrl {
    display: flex;
    align-items: center;
    gap: 14px;
    background: rgba(255,255,255,0.06);
    border-radius: 99px;
    padding: 6px 14px;
  }

  .qty-btn {
    background: none; border: none;
    color: var(--gold);
    font-size: 1.3rem; font-weight: 700;
    cursor: pointer;
    width: 24px;
  }

  .qty-num { font-size: 1rem; font-weight: 700; color: var(--text-primary); min-width: 20px; text-align: center; }

  .add-to-tray-btn {
    background: linear-gradient(135deg, var(--gold), var(--clay));
    color: #000;
    border: none;
    border-radius: 99px;
    padding: 14px 24px;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
    margin-top: 20px;
    box-shadow: var(--shadow-glow);
  }

  /* Payment Section Card */
  .payment-card {
    background: linear-gradient(145deg, #231912, #18110C);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 20px;
    margin-top: 30px;
  }

  .payment-title {
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .payment-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px dotted var(--line-soft);
    font-size: 0.88rem;
  }

  .payment-row:last-child { border-bottom: none; }

  .copy-tag {
    font-size: 0.72rem;
    background: rgba(212, 175, 55, 0.15);
    color: var(--gold-light);
    padding: 4px 10px;
    border-radius: 99px;
    cursor: pointer;
    border: 1px solid var(--line);
  }

  .empty-search {
    text-align: center;
    padding: 50px 20px;
    color: var(--text-muted);
  }

  .empty-search svg { width: 48px; height: 48px; fill: none; stroke: var(--text-muted); stroke-width: 1.5; margin-bottom: 12px; }

</style>
</head>
<body>

  <!-- App Header -->
  <header class="app-header">
    <div class="brand-bar">
      <div class="brand-left">
        <div class="logo-container">
          <img src="logo.png" alt="J Nat Coffee Logo" onerror="this.src='https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&w=120&q=80'">
        </div>
        <div class="brand-title">
          <h1>J Nat Coffee</h1>
          <div class="sub"><span class="badge-open"></span> Open Daily &middot; Koye, Addis Ababa</div>
        </div>
      </div>
    </div>

    <!-- Live Search -->
    <div class="search-box">
      <svg class="search-icon" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <input type="text" id="searchInput" class="search-input" placeholder="Search menu (English or አማርኛ)..." autocomplete="off">
      <button class="clear-search" id="clearSearchBtn">&times;</button>
    </div>
  </header>

  <!-- Category Nav Strip -->
  <div class="category-nav-wrapper">
    <div class="category-strip" id="categoryStrip"></div>
  </div>

  <!-- Main Menu Grid Container -->
  <main class="main-content" id="mainContent"></main>

  <!-- Payment Card Footer -->
  <div class="main-content">
    <div class="payment-card">
      <div class="payment-title">💳 Direct Payment Accounts</div>
      <div class="payment-row">
        <div><strong>CBE</strong> &middot; Commercial Bank of Ethiopia</div>
        <div class="copy-tag" onclick="copyText('1000641332837')">1000641332837 📋</div>
      </div>
      <div class="payment-row">
        <div><strong>BOA</strong> &middot; Bank of Abyssinia</div>
        <div class="copy-tag" onclick="copyText('200756002')">200756002 📋</div>
      </div>
      <div class="payment-row">
        <div><strong>Telebirr</strong></div>
        <div class="copy-tag" onclick="copyText('0908488848')">0908488848 📋</div>
      </div>
    </div>
  </div>

  <!-- Floating Order Calculator Bar -->
  <div class="order-bar" id="orderBar">
    <div class="order-info">
      <div class="order-count" id="orderCount">0</div>
      <div>
        <div class="order-total-lbl">Table Total</div>
        <div class="order-total-val" id="orderTotal">0 ETB</div>
      </div>
    </div>
    <button class="view-order-btn" onclick="openCartModal()">View Order</button>
  </div>

  <!-- Item Detail Modal -->
  <div class="modal-overlay" id="detailModal">
    <div class="modal-sheet">
      <button class="modal-close" onclick="closeModal('detailModal')">&times;</button>
      <div class="modal-img-container">
        <img src="" id="modalImg" class="modal-img" alt="Item Image">
      </div>
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-amharic amharic" id="modalAmharic"></div>
      <div class="modal-desc" id="modalDesc"></div>
      <div style="font-size:1.2rem; font-weight:700; color:var(--gold);" id="modalPrice"></div>

      <div class="qty-row">
        <span>Select Quantity</span>
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="changeModalQty(-1)">-</button>
          <span class="qty-num" id="modalQtyNum">1</span>
          <button class="qty-btn" onclick="changeModalQty(1)">+</button>
        </div>
      </div>

      <button class="add-to-tray-btn" onclick="addModalItemToCart()">Add to Table Order</button>
    </div>
  </div>

  <!-- Cart Modal -->
  <div class="modal-overlay" id="cartModal">
    <div class="modal-sheet">
      <button class="modal-close" onclick="closeModal('cartModal')">&times;</button>
      <div class="modal-title" style="margin-bottom:16px;">📋 Table Order Calculator</div>
      <div id="cartItemsList"></div>
      
      <div style="display:flex; justify-content:space-between; align-items:center; margin-top:20px; padding-top:16px; border-top:1px solid var(--line); font-size:1.1rem; font-weight:700;">
        <span>Total Bill:</span>
        <span style="color:var(--gold);" id="cartModalTotal">0 ETB</span>
      </div>

      <button class="add-to-tray-btn" style="margin-top:20px;" onclick="closeModal('cartModal')">Back to Menu</button>
    </div>
  </div>

      { id: "c5", en: "Espresso shot", am: "እስፕሪስ", price: 50, desc: "Extra energizing single espresso shot.", img: "https://images.unsplash.com/photo-1510591509098-f4fdc6d0ff04?auto=format&fit=crop&w=600&q=80" },

/* State Variables */
let currentCategory = "all";
let searchKeyword = "";
let cart = {}; // { itemId: quantity }
let currentModalItem = null;
let currentModalQty = 1;

/* Initialization */
document.addEventListener("DOMContentLoaded", () => {
  renderCategoryStrip();
  renderMenu();
  setupEvents();
});

/* Render Category Strip */
function renderCategoryStrip() {
  const strip = document.getElementById("categoryStrip");
  let html = `<button class="cat-btn active" data-cat="all" onclick="selectCategory('all', this)">✨ All Items</button>`;
  menuData.forEach(cat => {
    html += `<button class="cat-btn" data-cat="${cat.category}" onclick="selectCategory('${cat.category}', this)"><span>${cat.icon}</span> ${cat.catName}</button>`;
  });
  strip.innerHTML = html;
}

/* Category Selection */
function selectCategory(catId, btnEl) {
  currentCategory = catId;
  document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
  btnEl.classList.add("active");
  btnEl.scrollIntoView({ behavior: "smooth", block: "nearest", inline: "center" });
  renderMenu();
}

/* Render Main Menu Grid */
function renderMenu() {
  const container = document.getElementById("mainContent");
  let html = "";
  let totalDisplayed = 0;

  const filteredCategories = menuData.filter(cat => currentCategory === "all" || cat.category === currentCategory);

  filteredCategories.forEach(cat => {
    // Filter items inside category based on search keyword
    const matchingItems = cat.items.filter(item => {
      if (!searchKeyword) return true;
      const kw = searchKeyword.toLowerCase();
      return item.en.toLowerCase().includes(kw) || item.am.includes(kw) || item.price.toString().includes(kw);
    });

    if (matchingItems.length > 0) {
      totalDisplayed += matchingItems.length;
      html += `
        <div class="section-title">
          <h2>${cat.icon} ${cat.catName}</h2>
          <span class="am-sub amharic">${cat.catAm}</span>
        </div>
        <div class="menu-grid">
      `;

      matchingItems.forEach(item => {
        const badgeHtml = item.badge ? `<div class="card-badge">${item.badge}</div>` : "";
        html += `
          <div class="card" onclick="openDetailModal('${item.id}')">
            <div class="card-img-wrap">
              <img src="${item.img}" class="card-img" alt="${item.en}" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&w=300&q=80'">
              ${badgeHtml}
            </div>
            <div class="card-body">
              <div>
                <div class="card-title-en">${item.en}</div>
                <div class="card-title-am amharic">${item.am}</div>
              </div>
              <div class="card-footer">
                <div class="card-price">${item.price}</div>
                <button class="add-btn" onclick="event.stopPropagation(); quickAddToCart('${item.id}')" title="Add to Order">+</button>
              </div>
            </div>
          </div>
        `;
      });

      html += `</div>`;
    }
  });

  if (totalDisplayed === 0) {
    html = `
      <div class="empty-search">
        <svg viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        <h3>No matching items found</h3>
        <p style="margin-top:6px; font-size:0.85rem;">Try searching for something else like "Coffee", "Shiro", or "Burger"</p>
      </div>
    `;
  }

  container.innerHTML = html;
}

/* Event Handlers */
function setupEvents() {
  const searchInput = document.getElementById("searchInput");
  const clearBtn = document.getElementById("clearSearchBtn");

  searchInput.addEventListener("input", (e) => {
    searchKeyword = e.target.value.trim();
    clearBtn.style.display = searchKeyword ? "block" : "none";
    renderMenu();
  });

  clearBtn.addEventListener("click", () => {
    searchInput.value = "";
    searchKeyword = "";
    clearBtn.style.display = "none";
    renderMenu();
  });
}

/* Search Helper */
function getItemById(id) {
  for (const cat of menuData) {
    const item = cat.items.find(i => i.id === id);
    if (item) return item;
  }
  return null;
}

/* Quick Add */
function quickAddToCart(id) {
  cart[id] = (cart[id] || 0) + 1;
  updateOrderBar();
}

/* Update Order Calculator Bar */
function updateOrderBar() {
  const orderBar = document.getElementById("orderBar");
  let totalCount = 0;
  let totalPrice = 0;

  for (const [id, qty] of Object.entries(cart)) {
    if (qty > 0) {
      const item = getItemById(id);
      if (item) {
        totalCount += qty;
        totalPrice += item.price * qty;
      }
    }
  }

  document.getElementById("orderCount").textContent = totalCount;
  document.getElementById("orderTotal").textContent = `${totalPrice} ETB`;

  if (totalCount > 0) {
    orderBar.classList.add("show");
  } else {
    orderBar.classList.remove("show");
  }
}

/* Modal Controller */
function openDetailModal(id) {
  const item = getItemById(id);
  if (!item) return;
  currentModalItem = item;
  currentModalQty = 1;

  document.getElementById("modalImg").src = item.img;
  document.getElementById("modalTitle").textContent = item.en;
  document.getElementById("modalAmharic").textContent = item.am;
  document.getElementById("modalDesc").textContent = item.desc || "Prepared fresh upon ordering.";
  document.getElementById("modalPrice").textContent = `${item.price} ETB`;
  document.getElementById("modalQtyNum").textContent = currentModalQty;

  document.getElementById("detailModal").classList.add("active");
}

function changeModalQty(delta) {
  currentModalQty = Math.max(1, currentModalQty + delta);
  document.getElementById("modalQtyNum").textContent = currentModalQty;
}

function addModalItemToCart() {
  if (currentModalItem) {
    cart[currentModalItem.id] = (cart[currentModalItem.id] || 0) + currentModalQty;
    updateOrderBar();
    closeModal("detailModal");
  }
}

function closeModal(modalId) {
  document.getElementById(modalId).classList.remove("active");
}

/* Cart Modal */
function openCartModal() {
  const cartList = document.getElementById("cartItemsList");
  let html = "";
  let totalPrice = 0;

  let hasItems = false;
  for (const [id, qty] of Object.entries(cart)) {
    if (qty > 0) {
      hasItems = true;
      const item = getItemById(id);
      if (item) {
        const itemTotal = item.price * qty;
        totalPrice += itemTotal;
        html += `
          <div style="display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px dotted var(--line-soft);">
            <div>
              <div style="font-weight:600; font-size:0.92rem;">${item.en}</div>
              <div style="font-size:0.78rem; color:var(--clay);" class="amharic">${item.am}</div>
              <div style="font-size:0.8rem; color:var(--text-muted); margin-top:2px;">${item.price} ETB &times; ${qty} = <span style="color:var(--gold);">${itemTotal} ETB</span></div>
            </div>
            <div class="qty-ctrl">
              <button class="qty-btn" onclick="updateCartQty('${id}', -1)">-</button>
              <span class="qty-num">${qty}</span>
              <button class="qty-btn" onclick="updateCartQty('${id}', 1)">+</button>
            </div>
          </div>
        `;
      }
    }
  }

  if (!hasItems) {
    html = `<div style="text-align:center; padding:20px; color:var(--text-muted);">Your table order is empty</div>`;
  }

  cartList.innerHTML = html;
  document.getElementById("cartModalTotal").textContent = `${totalPrice} ETB`;
  document.getElementById("cartModal").classList.add("active");
}

function updateCartQty(id, delta) {
  if (cart[id]) {
    cart[id] += delta;
    if (cart[id] <= 0) delete cart[id];
  }
  updateOrderBar();
  openCartModal(); // Refresh cart modal
}

/* Helper copy text */
function copyText(txt) {
  navigator.clipboard.writeText(txt).then(() => {
    alert("Copied account number: " + txt);
  }).catch(() => {
    prompt("Copy account number:", txt);
  });
}
